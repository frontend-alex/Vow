services:
  api:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.dev
    ports:
      - "8080:8080"
    environment:
      HTTP_ADDR: ":8080"
      APP_ENV: "development"
      DATABASE_URL: "postgres://vow:vow@postgres:5432/vow?sslmode=disable"
      JWT_SIGNING_KEY: "change-me-use-a-long-random-secret"
      JWT_ISSUER: "vow-api"
      JWT_ACCESS_TOKEN_TTL: "15m"
      JWT_REFRESH_TOKEN_TTL: "168h"
      GOOGLE_REDIRECT_URL: "http://localhost:8080/auth/google/callback"
      APPLE_REDIRECT_URL: "http://localhost:8080/auth/apple/callback"
      SMTP_PORT: "587"
      SMTP_FROM: "no-reply@example.com"
    volumes:
      - ../..:/app
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: vow
      POSTGRES_USER: vow
      POSTGRES_PASSWORD: vow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vow -d vow"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  go-mod-cache:
  go-build-cache:
  postgres-data:
