services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: vow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
    environment:
      HTTP_ADDR: :8080
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/vow?sslmode=disable
      JWT_SECRET: change-me
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  api-dev:
    image: golang:1.26-alpine
    working_dir: /src
    command: sh -c "go install github.com/air-verse/air@latest && air -c .air.toml"
    environment:
      HTTP_ADDR: :8080
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/vow?sslmode=disable
      JWT_SECRET: change-me
      LOG_LEVEL: info
      RATE_LIMIT_REQUESTS: 120
      CORS_ORIGINS: "*"
    ports:
      - "8080:8080"
    volumes:
      - ../..:/src
      - go-cache:/go/pkg/mod
    depends_on:
      - postgres

volumes:
  postgres-data:
  go-cache:
