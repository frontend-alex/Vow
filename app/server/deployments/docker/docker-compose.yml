services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: vow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
    environment:
      HTTP_ADDR: :8080
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/vow?sslmode=disable
      JWT_SECRET: change-me
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  postgres-data:
