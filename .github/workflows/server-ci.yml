name: server-ci

on:
  pull_request:
    paths:
      - "server/**"
      - ".github/workflows/server-ci.yml"
  push:
    branches:
      - main
    paths:
      - "server/**"
      - ".github/workflows/server-ci.yml"

env:
  GO_VERSION: "1.25"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: server/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Check formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            gofmt -l .
            exit 1
          fi

      - name: Run vet
        run: go vet ./...

      - name: Run tests
        run: go test -race ./...

      - name: Build packages
        run: go build ./...
